<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novision Music</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

    <!-- GİRİŞ MODALI -->
    <div id="auth-modal" class="modal-overlay">
        <div class="modal-content">
            <img src="/icon.png" width="80" style="margin-bottom: 15px; border-radius: 50%;">
            <h2 style="margin-bottom: 20px;">Novision'a Giriş Yap</h2>
            <input type="email" id="emailInput" placeholder="E-posta" class="form-input">
            <input type="password" id="passInput" placeholder="Şifre" class="form-input">
            <button id="loginBtn" class="primary-btn">Giriş Yap</button>
        </div>
    </div>

    <div class="app-container">
        <!-- SOL PANEL -->
        <aside class="sidebar">
            <div class="logo">
                <img src="/icon.png" alt="Novision Logo" id="app-logo">
                <span>Novision Music</span>
            </div>
            <nav class="main-nav">
                <a href="#" id="nav-home" class="active"><span class="material-icons">home</span> Ana Sayfa</a>
            </nav>
            <div class="playlist-section">
                <div class="section-header">
                    <span>Kitaplığın</span>
                    <button class="icon-btn" id="create-playlist-btn" title="Yeni Liste Oluştur"><span class="material-icons">add</span></button>
                </div>
                <div class="playlist-list" id="user-playlists"></div>
            </div>
        </aside>

        <!-- ANA İÇERİK -->
        <main class="main-view">
            <header class="top-bar">
                <div class="search-bar">
                    <span class="material-icons">search</span>
                    <input type="text" id="searchInput" placeholder="Şarkı ara veya çalma listesi url'si yapıştır...">
                </div>
                <div class="user-profile">
                    <span id="nav-username" style="margin-right: 10px; font-weight: bold; font-size: 14px;"></span>
                    <div class="avatar" id="nav-avatar"></div>
                </div>
            </header>
            <div class="content-area" id="dynamic-content">
                <div style="display:flex; justify-content:center; align-items:center; height:100%; color:var(--text-muted);">
                    <h2>Müzik Aramak İçin Yukarıyı Kullan veya Kitaplığından Seçim Yap</h2>
                </div>
            </div>
        </main>
    </div>

    <!-- ALT OYNATICI (PLAYER BAR) -->
    <footer class="player-bar">
        <div class="now-playing">
            <img src="/icon.png" alt="" class="track-thumb" id="current-thumb">
            <div class="track-info">
                <div class="track-title" id="current-title">Şarkı Seçilmedi</div>
                <div class="track-artist" id="current-artist">-</div>
            </div>
        </div>

        <div class="player-controls-container">
            <div class="controls-main">
                <button class="icon-btn" id="shuffle-btn"><span class="material-icons">shuffle</span></button>
                <button class="icon-btn" id="prev-btn"><span class="material-icons">skip_previous</span></button>
                <button class="play-pause-btn" id="play-pause-btn"><span class="material-icons">play_arrow</span></button>
                <button class="icon-btn" id="next-btn"><span class="material-icons">skip_next</span></button>
                <button class="icon-btn" id="repeat-btn"><span class="material-icons">repeat</span></button>
            </div>
            <div class="progress-container">
                <span class="time" id="time-current">0:00</span>
                <input type="range" min="0" max="100" value="0" class="progress-bar" id="seek-bar">
                <span class="time" id="time-total">0:00</span>
            </div>
        </div>

        <div class="player-actions">
            <button class="icon-btn" title="Birlikte Dinle (Yakında)"><span class="material-icons">people</span></button>
            <button class="icon-btn"><span class="material-icons">volume_up</span></button>
            <input type="range" min="0" max="100" value="100" class="volume-bar" id="volume-bar">
        </div>
    </footer>

    <!-- Gizli YouTube İframe -->
    <div id="youtube-player" style="display: none;"></div>

    <script type="module" src="/main.js"></script>
</body>
</html>
